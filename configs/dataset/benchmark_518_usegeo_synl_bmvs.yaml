defaults:
  - default

# Number of views parameter for the multi-view datasets
num_views: 2

# Covisibility threshold for the multi-view datasets
covisibility_thres_min: 0.2
covisibility_thres_max: 1.0

# Sampling mode for the A3D dataset
sampling_mode: "random_walk" 

# Test Resolution
resolution_test_blendedmvs: ${dataset.resolution_options.518_1_33_ar} 
resolution_test_usegeo: ${dataset.resolution_options.518_1_33_ar} 
resolution_test_a3dsynl: ${dataset.resolution_options.518_1_33_ar} 

# Test Set
# usegeo: Sample 10 multi-view sets from each scene, 30 test scenes in total
# bmvs: Sample 10 multi-view sets from each scene, 100 test scenes in total
# a3d-syn-l: Sample 10 multi-view sets from each scene, 100 test scenes in total
test_dataset:
  "+ 30 @ ${dataset.usegeo_wai.test.dataset_str}
  + 100 @ ${dataset.blendedmvs_wai.test.dataset_str}
  + 100 @ ${dataset.a3dsynl_wai.test.dataset_str}"
  